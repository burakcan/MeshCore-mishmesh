name: Build Companion Firmwares

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'companion-*'

jobs:

  build:
    runs-on: ubuntu-latest
    env:
      # [mishmesh] Licensed emoji overlay (EmojiMania), injected only when the
      # repo secret is set — i.e. official builds. Forks and fork PRs never
      # receive the secret, so it resolves empty and the overlay is skipped,
      # producing an emoji-free build identical to a plain clone.
      EMOJI_OVERLAY_B64: ${{ secrets.EMOJI_OVERLAY_B64 }}
    steps:

      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Inject licensed emoji overlay (official builds only)
        if: ${{ env.EMOJI_OVERLAY_B64 != '' }}
        run: |
          mkdir -p mishmesh/text/emoji-local
          printf '%s' "$EMOJI_OVERLAY_B64" | base64 --decode | tar xz -C mishmesh/text/emoji-local
          echo "Emoji overlay injected:"; ls mishmesh/text/emoji-local

      - name: Build Firmwares
        env:
          FIRMWARE_VERSION: ${{ env.GIT_TAG_VERSION }}
        run: /usr/bin/env bash build.sh build-companion-firmwares

      - name: Upload Workflow Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: companion-firmwares
          path: out

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Companion Firmware ${{ env.GIT_TAG_VERSION }}
          body: ""
          draft: true
          files: out/*